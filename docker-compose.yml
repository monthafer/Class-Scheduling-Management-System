services:
  db:
    image: mysql:8.0
    container_name: csms-db
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "csms"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # Mount the sanitized SQL files to automatically initialize and seed the DB
      - ./CSMS MySQL files/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./CSMS MySQL files/data.sql:/docker-entrypoint-initdb.d/2-data.sql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql-data:
